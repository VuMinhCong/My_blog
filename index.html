<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- ===== CSS ===== -->
        <link rel="stylesheet" href="styles.css">

        <!-- ===== BOX ICONS ===== -->
        <link href='https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css' rel='stylesheet'>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

        <title>VU MINH CONG - Portfolio</title>
    </head>
    <body>
        <!--===== HEADER =====-->
        <header class="l-header">
            <nav class="nav bd-grid">
                <div class="nav__menu" id="nav-menu">
                    <ul class="nav__list">
                        <li class="nav__item"><a href="#home" class="nav__link active" data-i18n="nav.home"></a></li>
                        <li class="nav__item"><a href="#about" class="nav__link" data-i18n="nav.about"></a></li>
                        <li class="nav__item"><a href="#skills" class="nav__link" data-i18n="nav.skills"></a></li>
                        <li class="nav__item"><a href="#certificate" class="nav__link" data-i18n="nav.certificates"></a></li>
                        <li class="nav__item"><a href="#project" class="nav__link" data-i18n="nav.projects"></a></li>
                        <li class="nav__item"><a href="#contact" class="nav__link" data-i18n="nav.contact"></a></li>
                    </ul>
                    <div class="language-switcher">
                        <button onclick="i18n.switchLanguage('ja')" class="lang-btn" title="Japanese">🇯🇵</button>
                        <button onclick="i18n.switchLanguage('vi')" class="lang-btn" title="Vietnamese">🇬🇧</button>
                    </div>
                </div>

                <div class="nav__toggle" id="nav-toggle">
                    <i class='bx bx-menu'></i>
                </div>
            </nav>
        </header>

        <!--===== SCROLL TOP ====-->
        <a href="#" class="scrolltop" id="scroll-top">
            <i class='bx bx-chevron-up scrolltop__icon'></i>
        </a>

        <main class="l-main">
            <!--===== HOME =====-->
            <section class="home" id="home">
                <div class="home__container bd-grid">
                    <h1 class="home__title">
                        <span data-i18n="home.greeting"></span><br>
                        <span data-i18n="home.i_am"></span><br>
                        <span data-i18n="home.name"></span>
                    </h1>
                    <div class="home__scroll">
                        <a href="#about" class="home__scroll-link">
                            <i class='bx bx-up-arrow-alt'></i>
                            <span data-i18n="home.scroll_down"></span>
                        </a>
                    </div>
                    <img src="img/chot1.png" alt="" class="home__img">
                </div>
            </section>

            <!--===== ABOUT =====-->
            <section class="about section" id="about">
                <h2 class="section-title" data-i18n="about.title"></h2>
                <div class="about__container bd-grid">
                    <div class="about__img">
                        <img src="img/chot.png" alt="">
                    </div>

                    <div>
                        <h2 class="about__subtitle" data-i18n="about.name"></h2>
                        <span class="about__profession" data-i18n="about.profession"></span>

                        <p class="about__text" data-i18n="about.description"></p>

                        <div class="about__social">
                            <a href="https://www.facebook.com/MinhCong999" class="about__social-icon"><i class='bx bxl-facebook-circle'></i></a>
                            <a href="https://twitter.com/Minh_Cong999" class="about__social-icon"><i class='bx bxl-twitter'></i></a>
                            <a href="https://github.com/VuMinhCong" class="about__social-icon"><i class='bx bxl-github'></i></a>
                        </div>
                    </div>
                </div>
            </section>

            <!--===== SKILLS =====-->
            <section class="skills section" id="skills">
                <h2 class="section-title" data-i18n="skills.title"></h2>
                <div class="skills__container bd-grid">
                    <div class="skills__box">
                        <h3 class="skills__subtitle" data-i18n="skills.development"></h3>
                        <span class="skills__name">Ruby</span>
                        <span class="skills__name">Ruby on Rails</span>
                        <span class="skills__name">Java</span>
                        <span class="skills__name">JavaScript</span>
                        <span class="skills__name">jQuery</span>
                        <span class="skills__name">Database</span>
                        <span class="skills__name">Docker</span>
                        <span class="skills__name">CI/CD</span>
                        <span class="skills__name">AWS</span>

                        <h3 class="skills__subtitle" data-i18n="skills.languages"></h3>
                        <span class="skills__name" data-i18n="skills.japanese"></span>
                        <span class="skills__name" data-i18n="skills.english"></span>
                    </div>

                    <div class="skills__img">
                        <img src="img/skill.jpg" alt="">
                    </div>
                </div>
            </section>

            <!--===== CERTIFICATE =====-->
            <section class="certificate section" id="certificate">
                <h2 class="section-title" data-i18n="certificates.title"></h2>
                <div class="certificate__container bd-grid">
                    <div class="certificate__item">
                        <img src="img/JLPTN2.png" alt="JLPT N2" class="certificate__img">
                        <div>
                            <h3 class="certificate__name">JLPT N2</h3>
                            <p class="certificate__desc" data-i18n="certificates.jlpt"></p>
                        </div>
                    </div>
                    <div class="certificate__item">
                        <img src="img/SAA.png" alt="AWS SAA" class="certificate__img">
                        <div>
                            <h3 class="certificate__name"><a href="https://www.credly.com/badges/cb8868ec-c269-428a-ab70-faccd350439b" target="_blank" rel="noopener noreferrer">AWS Certified Solutions Architect – Associate</a></h3>
                            <p class="certificate__desc" data-i18n="certificates.aws_saa"></p>
                        </div>
                    </div>
                    <div class="certificate__item">
                        <img src="img/DVA.png" alt="AWS DVA" class="certificate__img">
                        <div>
                            <h3 class="certificate__name"><a href="https://www.credly.com/badges/1eccae07-ab67-40e6-b468-9ca81c53d867" target="_blank" rel="noopener noreferrer">AWS Certified Developer – Associate</a></h3>
                            <p class="certificate__desc" data-i18n="certificates.aws_dva"></p>
                        </div>
                    </div>
                </div>
            </section>

            <!--===== My Project =====-->
            <section class="project section" id="project">
                <h2 class="section-title" data-i18n="projects.title"></h2>
                <div class="project__container bd-grid">
                    <div class="project__img">
                        <img src="img/github-ana.jpg" alt="">

                        <div class="project__link">
                            <a href="javascript:void(0)" class="project__link-icon" onclick="openGithubAnaPopup()"><i class="bx bx-link-alt"></i></a>
                            <span class="project__link-name" data-i18n="projects.github_analysis"></span>
                        </div>
                    </div>
                    <div class="project__img">
                        <img src="img/factoring.jpg" alt="">

                        <div class="project__link">
                            <a href="javascript:void(0)" class="project__link-icon" onclick="openFactoringPopup()"><i class="bx bx-link-alt"></i></a>
                            <span class="project__link-name" data-i18n="projects.factoring"></span>
                        </div>
                    </div>
                    <div class="project__img">
                        <img src="img/project2.jpg" alt="">

                        <div class="project__link">
                            <a href="https://drive.google.com/file/d/1MWrfOh2o2G_uSWpGt2uDBdDJsBAmaTvZ/view?usp=sharing" class="project__link-icon"><i class="bx bx-link-alt"></i></a>
                            <span class="project__link-name" data-i18n="projects.cafe"></span>
                        </div>
                    </div>
                </div>
            </section>

            <!--===== CONTACT =====-->
            <section class="contact section" id="contact">
                <h2 class="section-title" data-i18n="contact.title"></h2>
                <div class="contact__container bd-grid">
                    <div class="contact__info">
                        <h3 class="contact__subtitle" data-i18n="contact.email"></h3>
                        <span class="contact__text">minhcong.vu99@gmail.com</span>

                        <h3 class="contact__subtitle" data-i18n="contact.phone"></h3>
                        <span class="contact__text">070-2800-3487</span>

                        <h3 class="contact__subtitle" data-i18n="contact.address"></h3>
                        <span class="contact__text" data-i18n="contact.address_value"></span>
                    </div>

                    <form action="" class="contact__form">
                        <div class="contact__inputs">
                            <input type="text" placeholder="Name" class="contact__input">
                            <input type="mail" placeholder="Email" class="contact__input">
                        </div>

                        <textarea name="" id="" cols="0" rows="10" class="contact__input"></textarea>

                        <input type="submit" value="Submit" class="contact__button">
                    </form>
                </div>
            </section>
        </main>

        <!--===== FOOTER =====-->
        <footer class="footer section">
            <div class="footer__container bd-grid">
                <div class="footer__data">
                    <h2 class="footer__title" data-i18n="footer.title"></h2>
                    <p class="footer__text" data-i18n="footer.description"></p>
                </div>

                <div class="footer__data">
                    <h2 class="footer__title" data-i18n="footer.menu"></h2>
                    <ul>
                        <li><a href="#home" class="footer__link" data-i18n="nav.home"></a></li>
                        <li><a href="#about" class="footer__link" data-i18n="nav.about"></a></li>
                        <li><a href="#skills" class="footer__link" data-i18n="nav.skills"></a></li>
                        <li><a href="#certificate" class="footer__link" data-i18n="nav.certificates"></a></li>
                        <li><a href="#project" class="footer__link" data-i18n="nav.projects"></a></li>
                        <li><a href="#contact" class="footer__link" data-i18n="nav.contact"></a></li>
                    </ul>
                </div>

                <div class="footer__data">
                    <h2 class="footer__title" data-i18n="footer.social"></h2>
                    <a href="https://www.facebook.com/MinhCong999" class="footer__social"><i class='bx bxl-facebook'></i></a>
                    <a href="https://www.instagram.com/_mcong9x64" class="footer__social"><i class='bx bxl-instagram'></i></a>
                    <a href="https://twitter.com/Minh_Cong999" class="footer__social"><i class='bx bxl-twitter'></i></a>
                </div>
            </div>
        </footer>

        <!--===== SCROLL REVEAL =====-->
        <script src="https://unpkg.com/scrollreveal"></script>

        <!--===== MAIN JS =====-->
        <script src="js/i18n.js"></script>
        <script src="script.js"></script>

        <!-- FACTORING POPUP -->
        <div id="factoring-popup" class="popup-overlay" style="display:none;">
          <div class="popup-content">
            <span class="popup-close" onclick="closeFactoringPopup()">&times;</span>
            <div>
              <h3 data-i18n="popups.factoring.title"></h3>
              <ul id="factoring-responsibilities"></ul>
            </div>
          </div>
        </div>

        <!-- GITHUB ANALYSIS POPUP -->
        <div id="githubana-popup" class="popup-overlay" style="display:none;">
          <div class="popup-content">
            <span class="popup-close" onclick="closeGithubAnaPopup()">&times;</span>
            <div>
              <h3 data-i18n="popups.github_analysis.title"></h3>
              <ul id="githubana-responsibilities"></ul>
            </div>
          </div>
        </div>
    </body>
</html>
